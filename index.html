<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Churchill SkinCheck</title>
  <script>
    // Automagical redirect based on browser language
    var lang = navigator.language || navigator.userLanguage;
    if (lang.indexOf('fr') > -1) {
      window.location.replace('fr/index.html');
    } else {
      window.location.replace('en/index.html');
    }
  </script>
</head>
<body>
  <p>Redirecting to <a href="fr/index.html">FR</a> or <a href="en/index.html">EN</a>...</p>
</body>
</html>
